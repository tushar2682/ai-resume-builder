version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./resumebuilderapi
    container_name: resumebuilder-api
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/resumebuilder
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    depends_on:
      - mongodb

  frontend:
    build: ./resumebuilderui
    container_name: resumebuilder-ui
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
